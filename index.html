  <body>
    <script>
      (function () {
        try {
          var s = localStorage.getItem("growtiva-theme");
          var d = s
            ? s === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          var c = document.documentElement.classList;
          if (d) c.add("dark");
          else c.remove("dark");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
